<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="icon.png">
<title>Vocabulary Trainer</title>
<style>
body { font-family:-apple-system, sans-serif; margin:0; padding:0; background:#f5f5f5; }
header { background:#007AFF; color:white; padding:20px; text-align:center; font-size:24px; font-weight:bold; position:relative; }
.container { display:flex; height:calc(100vh - 70px); }
.sidebar { width:0; overflow-x:hidden; transition:0.3s; background:#fff; border-right:1px solid #ccc; padding:20px 0; box-shadow:2px 0 5px rgba(0,0,0,0.1); }
.sidebar.open { width:300px; }
.sidebar h3 { padding:10px 20px; margin:0; cursor:pointer; background:#f0f0f0; }
.sidebar .card { padding:10px 20px; display:none; }
.sidebar input, .sidebar select, .sidebar button, .sidebar textarea { width:100%; padding:8px; margin:5px 0; border-radius:6px; border:1px solid #ccc; box-sizing:border-box; }
.sidebar button { background:#007AFF; color:white; border:none; }
.main { flex:1; padding:20px; overflow-y:auto; }
.main button { background:#007AFF; color:white; border:none; padding:10px; margin:5px 0; width:200px; border-radius:8px; cursor:pointer; }
.card { background:white; padding:15px; border-radius:12px; margin-bottom:15px; }
.result-item { padding:8px; margin-bottom:5px; border-radius:6px; }
.result-item.good { background:#c8f7c5; }
.result-item.bad { background:#f7c5c5; }
#testArea button { margin-top:5px; }
</style>
</head>
<body>

<header>
  <button style="position:absolute; top:20px; left:5px;" onclick="toggleSidebar()">☰ Меню</button>
  📚 Krok-3 Trainer
</header>

<div class="container">
  <div class="sidebar" id="sidebar">
    <h3 onclick="toggleCard('addCard')">➕ Додавання питання</h3>
    <div class="card" id="addCard">
      <input id="questionText" placeholder="Питання">
      <textarea id="answersText" placeholder="Введи варіанти через коми, наприклад: вар1, вар2, вар3" rows="3"></textarea>
      <input id="correctIndex" type="number" placeholder="Індекс правильної відповіді (0,1,2...)">
      <button onclick="addQuestion()">Додати</button>
    </div>

    <h3 onclick="toggleCard('questionBaseCard')">📖 База питань</h3>
    <div class="card" id="questionBaseCard">
      <input id="searchQuestion" placeholder="Пошук" oninput="renderQuestions()">
      <button onclick="clearSearch()">Очистити пошук</button>
      <div id="questionStats" style="font-weight:bold;margin-bottom:10px;"></div>
      <div id="questionList"></div>
    </div>

    <h3 onclick="toggleCard('exportCard')">📎 Експорт/Імпорт</h3>
    <div class="card" id="exportCard">
      <button onclick="exportData()">📥 Експорт</button>
      <input type="file" onchange="importData(event)">
    </div>
    <button onclick="hardReload()">🔄 Перезавантажити PWA</button>
  </div>

  <div class="main">
    <button onclick="toggleTestCard()">🧠 Вибір тестів</button>
    <div class="card" id="testCard" style="display:none;">
      <div>
        <button onclick="setTestCount(5)">5 питань</button>
        <button onclick="setTestCount(10)">10 питань</button>
        <button onclick="setTestCount('')">Довільна</button>
      </div>
      <input id="testCount" type="number" placeholder="Кількість питань">
      <button onclick="startTest()">Почати тест</button>
    </div>

    <div id="testArea" class="card" style="display:none;"></div>

    <div id="resultsBox" class="card" style="display:none;">
      <h3>Результати</h3>
      <button onclick="retryBad()">🔁 Повторити слабкі</button>
      <button onclick="filterResults('all')">Всі</button>
      <button onclick="filterResults('bad')">🔴 Неправильні</button>
      <button onclick="filterResults('good')">🟢 Правильні</button>
      <div id="resultsList" style="margin-top:10px;"></div>
      <button onclick="closeResults()">Закрити</button>
    </div>
  </div>
</div>

<script>
// Sidebar
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }
function toggleCard(id){ const c=document.getElementById(id); c.style.display=c.style.display==='block'?'none':'block'; }
function toggleTestCard(){ const c=document.getElementById('testCard'); c.style.display=c.style.display==='block'?'none':'block'; }

// Дані
let questions = JSON.parse(localStorage.getItem("questions")||"[]");
let userAnswers = [];
let testList = [];
let totalQuestions = 0;
let currentIndex = 0;

function save(){ localStorage.setItem("questions", JSON.stringify(questions)); }

// Додавання питання
function addQuestion(){
  const q = document.getElementById("questionText").value.trim();
  const ansText = document.getElementById("answersText").value.trim();
  const correct = parseInt(document.getElementById("correctIndex").value);
  if(!q || !ansText || isNaN(correct)) return;
  const answers = ansText.split(",").map(s=>s.trim()).filter(Boolean);
  if(correct<0 || correct>=answers.length){ alert("Індекс правильного відповіді невірний"); return; }
  questions.push({question:q, answers, correct, stats:{correct:0,wrong:0}});
  save(); renderQuestions();
  document.getElementById("questionText").value="";
  document.getElementById("answersText").value="";
  document.getElementById("correctIndex").value="";
}

// Тести
function startTest(){
  userAnswers=[];
  let count = parseInt(document.getElementById("testCount").value);
  if(!count || count<=0) count = questions.length;
  testList = shuffle([...questions]);
  if(count < testList.length) testList = testList.slice(0,count);
  document.getElementById("testCard").style.display="none";
  totalQuestions = testList.length;
  currentIndex = 0;
  nextQuestion();
}

function nextQuestion(){
  if(currentIndex>=totalQuestions){
    document.getElementById("testArea").style.display="none";
    showResults();
    return;
  }
  const q = testList[currentIndex];
  const area = document.getElementById("testArea");
  area.style.display="block";
  area.innerHTML = `<div style="font-size:14px;opacity:0.7;">Питання ${currentIndex+1}/${totalQuestions}</div>
  <h3>${q.question}</h3>`;

  // Рандомізація відповідей
  const answerOrder = q.answers.map((ans,i)=>({ans,i}));
  shuffle(answerOrder);

  answerOrder.forEach(item=>{
    let btn = document.createElement("button");
    btn.textContent = item.ans;
    btn.style.display="block";
    btn.style.width="100%";
    btn.onclick = ()=>checkAnswer(q,item.i);
    area.appendChild(btn);
  });
}

function checkAnswer(q, idx){
  let isCorrect = idx===q.correct;
  if(!q.stats) q.stats={correct:0,wrong:0};
  if(isCorrect) q.stats.correct++; else q.stats.wrong++;
  userAnswers.push({question:q.question, correct:q.answers[q.correct], user:q.answers[idx], status:isCorrect?"good":"bad"});
  save();
  showFeedback(isCorrect?"✅ Правильно!":"❌ Неправильно! Правильно: "+q.answers[q.correct]);
  currentIndex++;
}

// Результати
function showResults(){
  const box = document.getElementById("resultsBox");
  const list = document.getElementById("resultsList");
  list.innerHTML="";
  userAnswers.forEach(item=>{
    const div = document.createElement("div");
    div.className = "result-item "+item.status;
    div.innerHTML = `<b>${item.question}</b><br>Ти: ${item.user}<br>Правильно: ${item.correct}`;
    list.appendChild(div);
  });
  box.style.display="block";
}
function closeResults(){ document.getElementById("resultsBox").style.display="none"; }
function filterResults(type){
  const list = document.getElementById("resultsList");
  list.innerHTML="";
  let filtered = type==="all"?userAnswers:userAnswers.filter(i=>i.status===type);
  filtered.forEach(item=>{
    const div=document.createElement("div");
    div.className="result-item "+item.status;
    div.innerHTML = `<b>${item.question}</b><br>Ти: ${item.user}<br>Правильно: ${item.correct}`;
    list.appendChild(div);
  });
}
function retryBad(){
  const retryList = userAnswers.filter(i=>i.status==="bad").map(i=>questions.find(q=>q.question===i.question)).filter(Boolean);
  if(retryList.length===0){ alert("Немає слабких питань 👍"); return; }
  userAnswers=[];
  testList = retryList;
  totalQuestions = testList.length;
  currentIndex = 0;
  nextQuestion();
}

// Рендер
function renderQuestions(){
  const search = document.getElementById("searchQuestion")?.value.trim().toLowerCase();
  const list = document.getElementById("questionList");
  list.innerHTML="";
  document.getElementById("questionStats").innerText = renderStats();
  questions.forEach((q,i)=>{
    if(search && !q.question.toLowerCase().includes(search)) return;
    list.innerHTML += `<div style="margin-bottom:10px;padding:10px;border-radius:8px;background:#fff3b0;">
      <b>${q.question}</b><br>
      <button onclick="editQuestion(${i})">✏️</button>
      <button onclick="deleteQuestion(${i})">🗑</button>
    </div>`;
  });
}
function renderStats(){
  let good=0,bad=0;
  questions.forEach(q=>{
    if((q.stats.correct||0) - (q.stats.wrong||0) >0) good++; else if((q.stats.correct||0) - (q.stats.wrong||0) <=0) bad++;
  });
  return `Всього: ${questions.length} | Правильних: ${good} 🟢 | Неправильних: ${bad} 🔴`;
}
function deleteQuestion(i){ if(confirm("Видалити питання?")){questions.splice(i,1); save(); renderQuestions();} }
function editQuestion(i){
  let qText = prompt("Питання:",questions[i].question);
  if(!qText) return;
  let ansText = prompt("Варіанти (через коми):",questions[i].answers.join(", "));
  if(!ansText) return;
  let correct = parseInt(prompt("Правильний індекс:",questions[i].correct));
  questions[i] = {question:qText, answers: ansText.split(",").map(s=>s.trim()).filter(Boolean), correct, stats:questions[i].stats||{correct:0,wrong:0}};
  save(); renderQuestions();
}

// UI
function showFeedback(text){
  const area=document.getElementById("testArea");
  let msg=document.createElement("div"); msg.style.marginTop="10px"; msg.innerText=text;
  let btn=document.createElement("button"); btn.textContent="Далі"; btn.onclick=nextQuestion;
  area.appendChild(msg); area.appendChild(btn);
}
function setTestCount(val){ const input=document.getElementById("testCount"); input.value=val===''?'':val; input.placeholder=val===''?"Введи кількість":input.placeholder; }

// Експорт/Імпорт
function exportData(){ let blob=new Blob([JSON.stringify(questions)],{type:"application/json"}); let a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="backup.json"; a.click(); }
function importData(e){
  // 1️⃣ Автоматичний експорт поточних даних
  if(questions.length > 0){
    let blob = new Blob([JSON.stringify(questions)], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "backup_before_import.json"; // файл зберігається на телефон
    a.click();
  }

  // 2️⃣ Видаляємо старі дані
  questions = [];
  localStorage.removeItem("questions");

  // 3️⃣ Завантажуємо новий файл
  let reader = new FileReader();
  reader.onload = function(){
    try {
      questions = JSON.parse(reader.result);
      save(); // зберігаємо нові дані
      renderQuestions();
      alert("Імпортовано нові дані успішно");
    } catch(err){
      alert("Помилка при імпорті файлу: " + err);
    }
  };
  reader.readAsText(e.target.files[0]);
}
function clearSearch(){ if(document.getElementById("searchQuestion")){document.getElementById("searchQuestion").value=""; renderQuestions();} }
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

renderQuestions();
</script>
</body>
</html>
